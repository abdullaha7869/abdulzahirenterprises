backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  # Products Collection
  - name: "products"
    label: "Products"
    folder: "_data/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "name", widget: "string", required: true }
      - { label: "Category", name: "category", widget: "select", options: ["water", "petrol", "diesel", "trolleys"], required: true }
      - { label: "Icon", name: "icon", widget: "string", default: "💧", required: true }
      - { label: "Description", name: "description", widget: "text", required: true }
      - { label: "Features", name: "features", widget: "list", field: { label: "Feature", name: "feature", widget: "string" } }
      - { label: "Sizes", name: "sizes", widget: "list", field: { label: "Size", name: "size", widget: "string" } }
      - { label: "Warranty", name: "warranty", widget: "string", required: true, default: "1-year warranty on tanks only" }
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
      - { label: "Order", name: "order", widget: "number", default: 0 }

  # Blog Posts Collection
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Slug", name: "slug", widget: "string", required: true }
      - { label: "Date", name: "date", widget: "datetime", required: true }
      - { label: "Icon", name: "icon", widget: "string", default: "📝", required: true }
      - { label: "Author", name: "author", widget: "string", default: "Abdulzahir Enterprises" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: true }
      - { label: "Body", name: "body", widget: "markdown", required: true }
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
      - { label: "Featured Image", name: "image", widget: "image", required: false }

  # Gallery Collection
  - name: "gallery"
    label: "Gallery"
    folder: "_data/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Icon", name: "icon", widget: "string", default: "📷", required: true }
      - { label: "Image", name: "image", widget: "image", required: true }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Order", name: "order", widget: "number", default: 0 }

  # Site Settings
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "_data/settings.json"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string", required: true }
          - { label: "Site Description", name: "site_description", widget: "text", required: true }
          - { label: "Contact Phone", name: "contact_phone", widget: "string", required: true }
          - { label: "Contact Email", name: "contact_email", widget: "string", required: true }
          - { label: "Address", name: "address", widget: "text", required: true }
          - { label: "Facebook URL", name: "facebook_url", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram_url", widget: "string", required: false }
          - { label: "WhatsApp Number", name: "whatsapp_number", widget: "string", required: false }